<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saidao</title>
    <meta name="description" content="Saidao live hub">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        /* Reduce animation load on low-power/mobile devices */
        html.reduced-motion #logo-container,
        html.reduced-motion #lottie-container,
        html.reduced-motion .faction-animation-row,
        html.reduced-motion #logo-container,
        html.reduced-motion #lottie-container {
            display: none !important;
        }
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
    <script>
        (function () {
            const prefersReduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const saveData = navigator.connection && navigator.connection.saveData;
            const lowCpu = typeof navigator.hardwareConcurrency === 'number' && navigator.hardwareConcurrency <= 4;
            const lowMem = typeof navigator.deviceMemory === 'number' && navigator.deviceMemory <= 4;
            const isSmallScreen = window.innerWidth <= 768;
            const reduceMotion = prefersReduce || saveData || lowCpu || lowMem || isSmallScreen;

            document.documentElement.classList.toggle('reduced-motion', reduceMotion);
            window.__REDUCE_MOTION__ = reduceMotion;
            window.__LIMITED_MOTION__ = reduceMotion;
        })();
    </script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
    <script defer src="assets/js/config.js"></script>
    <script defer src="assets/js/api.js"></script>
    <script defer src="assets/js/app.js"></script>
</head>
<body>
<div class="container">
    <!-- 头部 -->
    <header>
        <div class="logo">
            <div id="logo-container" style="width:40px;height:40px;"></div>
            <span class="logo-text">抽象赛道网</span>
        </div>

        <div id="global-loading" style="display:flex">
            <div id="lottie-container" style="width:120px;height:120px;"></div>
        </div>

        <div class="header-controls">
            <button class="btn btn-secondary btn-icon" id="sponsorBtn" >
                <i class="fas fa-heart"></i>
            </button>
            <!-- PWA安装按钮（默认隐藏） -->
            <button class="btn btn-primary btn-icon" id="installButton" style="display: none;">
                <i class="fas fa-download"></i>
            </button>
            <!-- 深色模式按钮 -->
            <button class="btn btn-secondary btn-icon" id="darkModeToggleBtn">
                <i class="fas fa-moon"></i>
            </button>
            <!-- 隐藏复选框 -->
            <input type="checkbox" id="darkModeToggle" style="display: none;">
            <button class="btn btn-primary" id="loginBtn">
                <i class="fas fa-user"></i>
                <span class="btn-text">登录/注册</span>
            </button>
            <img alt="用户头像" class="user-avatar" id="userAvatar" style="display: none;">
        </div>
    </header>

    <!-- 筛选器 -->
    <div class="filter-section">
        <div class="filter-tabs">
            <button class="filter-tab active" data-status="live">直播中</button>
            <button class="filter-tab" data-status="all">全部</button>
            <button class="btn refresh-btn" id="refreshBtn" aria-label="刷新当前列表">
                <span class="refresh-icon">↻</span>
                <span>刷新</span>
            </button>
        </div>
    </div>

    <!-- 在页面 body 里加入一个容器 -->
    <div id="toast-container"></div>

    <!-- 主播卡片容器 -->
    <div class="cards-container">
        <div class="cards-grid" id="cardsGrid">
            <!-- 卡片将通过JavaScript动态生成 -->
        </div>
    </div>

    <!-- 聊天室侧边栏 -->
    <div class="chat-sidebar collapsed" id="chatSidebar">
        <div class="chat-resize-handle" id="chatResizeHandle"></div>
        <div class="chat-header">
            <div class="chat-title">
                <i class="fas fa-comments"></i>
                聊天室
                <span class="online-count" id="onlineCount"></span>
                <button class="chat-close" id="closeChat">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <button class="chat-toggle" id="collapseChat">
                <i class="fas fa-comment-dots"></i>
            </button>
        </div>
        <div class="chat-body" id="chatBody">
            <!-- 聊天消息将通过JavaScript动态生成 -->
        </div>

        <div class="quote-preview" id="quotePreview"></div>
        <div class="chat-footer">
            <div class="emoji-section" id="emojiSection">
                <div class="emoji-tabs">
                    <button class="emoji-tab" data-group="common">常用表情</button>
                    <button class="emoji-tab" data-group="animation">动画表情</button>
                    <button class="emoji-tab active" data-group="vip">test</button>
                </div>
                <div class="emoji-container" id="emojiContainer">
                    <!-- 表情将通过JavaScript动态生成 -->
                </div>
            </div>
            <div class="chat-input-container">
                <button class="emoji-toggle" id="emojiToggle">
                    <i class="far fa-smile"></i>
                </button>
                <input type="text" class="chat-input" id="chatInput" placeholder="来嘟两句呗..." maxlength="256">
                <button class="send-btn" id="sendBtn" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 登录模态框 -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">登录</h3>
            <button class="modal-close" id="closeLoginModal">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">邮箱</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="loginPassword">密码</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" required>
                </div>
                <div class="form-group">
                    <button type="button" class="btn btn-secondary" id="forgotPassword" style="font-size: 13px; padding: 7px 14px;">
                        忘记密码？
                    </button>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">
                        登录
                    </button>
                </div>
                <div class="form-group" style="text-align: center;">
                    <p style="color: var(--text-light); margin-bottom: 8px; font-size: 14px;">还没有账号？</p>
                    <button type="button" class="btn btn-secondary" id="switchToRegister" style="width: 100%; padding: 12px;">
                        注册新账号
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 图形验证码模态框 -->
<div id="captchaModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999;">
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 8px;">
        <div style="text-align: center;">
            <img id="captchaImage" src="" style="height: 80px; cursor: pointer;">
            <div style="margin: 15px 0;">
                <input type="text" id="captchaCode" placeholder="输入验证码" style="padding: 8px; width: 200px;">
            </div>
            <button id="confirmCaptchaBtn" class="btn btn-primary" style="padding: 8px 20px;">确认</button>
        </div>
    </div>
</div>

<!-- 注册模态框 -->
<div class="modal" id="registerModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">注册</h3>
            <button class="modal-close" id="closeRegisterModal">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="registerEmail">邮箱</label>
                    <input type="email" class="form-input" id="registerEmail" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="registerPassword">密码</label>
                    <input type="password" class="form-input" id="registerPassword" placeholder="请输入密码（至少6位）" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">确认密码</label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="请再次输入密码" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" for="verificationCode">验证码</label>
                    <div class="input-with-button">
                        <input type="text" class="form-input" id="verificationCode" placeholder="请输入验证码" required>
                        <button type="button" class="btn btn-secondary" id="sendCodeBtn" style="white-space: nowrap; font-size: 13px;">
                            发送验证码
                        </button>
                    </div>
                    <p class="form-hint">验证码将发送到您的邮箱</p>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">
                        注册
                    </button>
                </div>
                <div class="form-group" style="text-align: center;">
                    <p style="color: var(--text-light); margin-bottom: 8px; font-size: 14px;">已有账号？</p>
                    <button type="button" class="btn btn-secondary" id="switchToLogin" style="width: 100%; padding: 12px;">
                        返回登录
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 忘记密码模态框 -->
<div class="modal" id="forgotPasswordModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">找回密码</h3>
            <button class="modal-close" id="closeForgotModal">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label class="form-label" for="forgotEmail">邮箱</label>
                    <input type="email" class="form-input" id="forgotEmail" placeholder="请输入绑定的邮箱" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="forgotCode">验证码</label>
                    <div class="input-with-button">
                        <input type="text" class="form-input" id="forgotCode" placeholder="请输入验证码" required>
                        <button type="button" class="btn btn-secondary" id="sendForgotCodeBtn" style="white-space: nowrap; font-size: 13px;">
                            发送验证码
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="newPassword">新密码</label>
                    <input type="password" class="form-input" id="newPassword" placeholder="请输入新密码（至少6位）" required minlength="6">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">
                        重置密码
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 个人信息编辑模态框 -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">编辑个人信息</h3>
            <button class="modal-close" id="closeProfileModal">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <form id="profileForm">
                <div class="form-group" style="text-align: center;">
                    <img class="detail-avatar" id="profileAvatar">
                    <input
                            type="file"
                            id="avatarFileInput"
                            accept="image/*"
                            style="display:none"
                    />
                    <button type="button" class="btn btn-secondary" id="changeAvatarBtn" style="margin-top: 8px; padding: 8px 16px; font-size: 13px;">
                        更换头像
                    </button>
                </div>
                <div class="form-group">
                    <label class="form-label" for="profileName">昵称</label>
                    <input type="text" class="form-input" id="profileName" placeholder="请输入昵称" required maxlength="16">
                </div>
                <div class="form-group">
                    <label class="form-label" for="profileBio">个性签名</label>
                    <textarea class="form-input" id="profileBio" placeholder="请输入个性签名" rows="3" maxlength="100"></textarea>
                </div>

                <div class="form-group">
                    <div class="form-label-row">
                        <label class="form-label">选择阵营</label>
                        <span class="form-hint" style="color: #f39c12;">
                            <i class="fas fa-exclamation-circle"></i> 选择后30天内不能更换
                        </span>
                    </div>
                    <div class="faction-options-row">
                        <div class="faction-option-row" data-faction="ya">
                            <div class="faction-animation-row" id="yaAnimation"></div>
                            <div class="faction-content-row">
                                <div class="faction-title-row">
                                    <span class="faction-name">牙</span>
                                </div>
                            </div>
                            <div class="faction-select-row">
                                <input type="radio" name="faction" id="factionYa" value="ya">
                                <label for="factionYa"></label>
                            </div>
                        </div>

                        <div class="faction-option-row" data-faction="juan">
                            <div class="faction-animation-row" id="juanAnimation"></div>
                            <div class="faction-content-row">
                                <div class="faction-title-row">
                                    <span class="faction-name">卷</span>
                                </div>
                            </div>
                            <div class="faction-select-row">
                                <input type="radio" name="faction" id="factionJuan" value="juan">
                                <label for="factionJuan"></label>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" id="selectedFaction" value="">
                </div>
                <div class="form-group">
                    <label class="form-label">开播通知</label>
                    <p class="form-hint">选择一种接收开播通知的方式</p>
                    <div class="webhook-options">
                        <div class="webhook-option" data-type="dingtalk">
                            <div class="webhook-icon">
                                <i class="fas fa-bell"></i>
                            </div>
                            <div>
                                <div style="font-weight: 500; font-size: 14px;">钉钉</div>
<!--                                <a style="font-size: 12px; color: var(&#45;&#45;text-light);" href="https://help.gitee.com/webhook/webhook-for-wecom-robot">创建机器人</a>-->
<!--                                <div style="font-size: 12px; color: var(&#45;&#45;text-light);">通过钉钉机器人接收开播通知</div>-->
                            </div>
                        </div>
                        <div class="webhook-option" data-type="wechat">
                            <div class="webhook-icon">
                                <i class="fab fa-weixin"></i>
                            </div>
                            <div>
                                <div style="font-weight: 500; font-size: 14px;">企微</div>
<!--                                <a style="font-size: 12px; color: var(&#45;&#45;text-light);" href="https://help.gitee.com/webhook/webhook-for-wecom-robot">创建机器人</a>-->
                            </div>
                        </div>
                        <div class="webhook-option" data-type="feishu">
                            <div class="webhook-icon">
                                <i class="fas fa-feather-alt"></i>
                            </div>
                            <div>
                                <div style="font-weight: 500; font-size: 14px;">飞书</div>
<!--                                <a style="font-size: 12px; color: var(&#45;&#45;text-light);" href="https://help.gitee.com/webhook/webhook-for-wecom-robot">创建机器人</a>-->
<!--                                <div style="font-size: 12px; color: var(&#45;&#45;text-light);">通过飞书机器人接收开播通知</div>-->
                            </div>
                        </div>
                    </div>
                    <a style="font-size: 12px; color: var(--text-light);" href="https://open.dingtalk.com/document/dingstart/custom-bot-creation-and-installation" target="_blank">创建钉钉机器人?</a>
                    <a style="font-size: 12px; color: var(--text-light);" href="https://help.gitee.com/webhook/webhook-for-wecom-robot" target="_blank">创建企微机器人?</a>
                    <a style="font-size: 12px; color: var(--text-light);" href="https://open.feishu.cn/document/client-docs/bot-v3/add-custom-bot#461aa643" target="_blank">创建飞书机器人?</a>
                    <input type="hidden" id="selectedWebhook" value="">
                </div>
                <div class="form-group" id="webhookUrlContainer" style="display: none;">
                    <label class="form-label" for="webhookUrl">Webhook地址</label>
                    <div style="display: flex; align-items: center;">
                        <input type="text" class="form-input" id="webhookUrl" placeholder="请输入Webhook地址">
                        <button type="button" class="btn btn-secondary" id="testWebhookBtn" style="margin-left: 10px; display: none;">测试</button>
                    </div>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">
                        保存更改
                    </button>
                    
                </div>
                <div class="form-group" style="text-align: center;">
                    <button type="button" class="btn btn-secondary" id="logoutBtn" style="width: 100%; padding: 12px; color: #e25822;">
                        <i class="fas fa-sign-out-alt"></i> 退出登录
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 用户详情模态框 -->
<div class="modal user-detail-modal" id="userDetailModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">用户详情</h3>
            <button class="modal-close" id="closeUserDetailModal">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <div class="user-detail">
                <img alt="用户头像" class="detail-avatar" id="detailAvatar">
                <div class="detail-info">
                    <h3 class="detail-name" id="detailName"></h3>
                    <p class="detail-bio" id="detailBio"></p>
                    <!-- New Fields -->
                    <p class="detail-user-id" id="detailUserId"></p>
                    <p class="detail-registration-time" id="detailRegistrationTime"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 主播标签编辑模态框 -->
<div class="modal tag-editor-modal" id="tagEditorModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">编辑标签</h3>
            <button class="modal-close" id="closeTagEditorModal">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <form id="tagEditorForm">
                <div class="tag-editor-layout">
                    <div class="tag-editor-preview-card">
                        <label class="tag-editor-label" for="tagEditorInput">主播</label>
                        <div class="tag-editor-title" id="tagEditorTitle"></div>
                        <div class="tag-editor-preview" id="tagEditorPreview">
                            <i class="fas fa-tag"></i>
                            <span>添加一个标签</span>
                        </div>
                        <div class="tag-editor-hint" id="tagEditorHint">当前主播还没有标签，输入后即可保存。</div>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="tagEditorInput">标签内容</label>
                        <input type="text" class="form-input" id="tagEditorInput" maxlength="16" placeholder="例如：人气担当 / 深夜档 / 常驻">
                    </div>
                    <div class="tag-editor-actions">
                        <button type="button" class="btn btn-secondary" id="tagEditorCancelBtn">取消</button>
                        <button type="submit" class="btn btn-primary" id="tagEditorSaveBtn">保存标签</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>



</body>
</html>
