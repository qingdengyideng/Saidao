<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saidao</title>
  <meta name="theme-color" content="#121317" />
  <link rel="stylesheet" href="assets/css/player.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
  <script defer src="assets/js/player.js"></script>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <span class="brand-text">Live Studio</span>
      </div>
      <div class="top-actions">
        <button class="ghost-btn" id="toggleMuteBtn">
          <span class="icon">🔊</span>
          <span class="label" id="muteLabel">静音</span>
        </button>
        <button class="ghost-btn" id="fullscreenBtn">
          <span class="icon">⛶</span>
          <span class="label" id="fullscreenLabel">全屏</span>
        </button>
        <button class="ghost-btn" id="originBtn">
          <span class="icon">↗</span>
          <span class="label">去源站</span>
        </button>
      </div>
    </header>

    <main class="layout" id="playerLayout">
      <section class="player-area">
<!--        <div class="player-header">-->
<!--          <div class="live-pill">-->
<!--            <span class="live-dot"></span>-->
<!--            直播中-->
<!--          </div>-->
<!--          <div class="source-text" id="liveSource">-&#45;&#45;</div>-->
<!--        </div>-->

        <div class="player-shell">
          <video id="video" class="video" playsinline webkit-playsinline muted autoplay></video>
          <div class="danmaku-layer" id="danmakuLayer"></div>
          <div class="status-overlay" id="statusOverlay">
            <div class="status-card">
              <div class="status-title" id="statusTitle">正在连接直播...</div>
              <div class="status-sub" id="statusSub">请稍候</div>
            </div>
          </div>
          <button class="tap-play" id="tapPlayBtn" type="button">
            点击播放
          </button>
          <div class="sound-hint" id="soundHint">按 P 开启声音</div>
        </div>

        <div class="player-footer">
          <div>
            <div class="stream-title">直播间</div>
            <div class="stream-sub" id="streamSub">加载中...</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="commentCount">0</div>
            <div class="stat-label">评论</div>
          </div>
        </div>
      </section>

      <aside class="comment-panel">
        <div class="panel-header">
          <div class="panel-title">直播评论</div>
          <div class="panel-sub" id="commentSub">连接中...</div>
        </div>
        <div class="comment-list" id="commentList"></div>
      </aside>
    </main>

    <div class="footer-note">
      仅 PC 播放，移动端将跳转到原链接。快捷键：P 开关声音。
    </div>
  </div>
</body>
</html>
